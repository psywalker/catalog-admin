<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Catalog Admin</title>
    <script>
      const pathSegmentsToKeep = 1;
      const { pathname, search, hash } = window.location;
      const l = window.location;

      const redirectTo =
        l.protocol +
        '//' +
        l.hostname +
        (l.port ? ':' + l.port : '') +
        '/' +
        pathname
          .split('/')
          .slice(1, pathSegmentsToKeep + 1)
          .join('/') +
        '/?p=/' +
        pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (search ? '&q=' + search.slice(1).replace(/&/g, '~and~') : '') +
        hash;

      window.location.replace(redirectTo);
    </script>
  </head>
  <body></body>
</html>
