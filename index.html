<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&family=Open+Sans:wght@400;500;600&family=Roboto+Mono:wght@400&family=Roboto:wght@400&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>catalog-admin</title>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const path = params.get('p');
        const query = params.get('q');

        if (path) {
          const newUrl =
            window.location.origin +
            '/catalog-admin' +
            path +
            (query ? '?' + query.replace(/~and~/g, '&') : '') +
            window.location.hash;

          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
